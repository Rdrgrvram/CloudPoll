<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados — CloudPoll</title>
  <meta name="description" content="Resultados en tiempo real de la encuesta. Porcentajes y conteos por opcion." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Navegacion principal">
    <a class="navbar-brand" href="index.html" aria-label="CloudPoll - Inicio">
      <div class="brand-icon" aria-hidden="true"><i class="fas fa-cloud"></i></div>
      <span>CloudPoll</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="results.html" class="active">Resultados</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <!-- ── Loading overlay ─────────────────────────────────────────── -->
  <div id="loading-overlay" class="spinner-overlay" role="status" aria-label="Cargando resultados">
    <div class="spinner-xl"></div>
  </div>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <main class="page-section" id="main-content">
    <div class="container-sm">

      <!-- Error state -->
      <div id="load-error" class="hidden animate-slideInUp" role="alert">
        <div class="empty-state">
          <div class="empty-state-icon" aria-hidden="true"><i class="fas fa-exclamation-circle"></i></div>
          <h2>Encuesta no encontrada</h2>
          <p id="load-error-msg">No se pudo cargar la encuesta.</p>
          <a href="index.html" class="btn btn-primary">Volver al inicio</a>
        </div>
      </div>

      <!-- Resultados -->
      <div id="results-section" class="hidden animate-fadeIn">

        <!-- Header -->
        <div style="margin-bottom:var(--space-xl)">
          <div style="display:flex; align-items:center; gap:var(--space-sm); margin-bottom:var(--space-md); flex-wrap:wrap">
            <span class="badge badge-success" id="poll-status-badge">Activa</span>
            <span class="poll-id-pill" id="poll-id-display"></span>
          </div>
          <h1 id="poll-title" style="margin-bottom:var(--space-sm)">Cargando...</h1>
          <p id="poll-description" class="text-muted"></p>
        </div>

        <!-- Stats strip -->
        <div class="stats-strip mb-xl" id="stats-strip" role="region" aria-label="Estadisticas generales">
          <div class="stat-item">
            <span class="stat-value" id="stat-total-votes">0</span>
            <span class="stat-label">Votos totales</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="stat-questions">0</span>
            <span class="stat-label">Preguntas</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="stat-created">—</span>
            <span class="stat-label">Creada</span>
          </div>
        </div>

        <!-- Preguntas y resultados -->
        <div id="results-container" role="region" aria-label="Resultados por pregunta"></div>

        <!-- Acciones -->
        <div style="display:flex; gap:var(--space-sm); margin-top:var(--space-xl); flex-wrap:wrap; align-items:center">
          <a id="link-vote" href="vote.html" class="btn btn-primary">
            <i class="fas fa-check" aria-hidden="true"></i> Votar ahora
          </a>
          <button id="btn-refresh" class="btn btn-secondary" type="button">
            <i class="fas fa-redo" aria-hidden="true"></i> Actualizar
          </button>
          <a href="index.html" class="btn btn-outline">Inicio</a>
          <p class="text-xs text-muted" id="last-updated" style="margin-left:auto"></p>
        </div>

      </div>

    </div>
  </main>

  <!-- ── Footer ──────────────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <p><strong>CloudPoll</strong> &mdash; Resultados en tiempo real</p>
    </div>
  </footer>

  <!-- ── Script ──────────────────────────────────────────────────── -->
  <script type="module">
    import { getResults } from "./js/api.js";

    const overlay        = document.getElementById("loading-overlay");
    const loadError      = document.getElementById("load-error");
    const loadErrMsg     = document.getElementById("load-error-msg");
    const resultsSection = document.getElementById("results-section");
    const pollTitle      = document.getElementById("poll-title");
    const pollDesc       = document.getElementById("poll-description");
    const pollIdDisplay  = document.getElementById("poll-id-display");
    const pollStatusBadge= document.getElementById("poll-status-badge");
    const statTotal      = document.getElementById("stat-total-votes");
    const statQuestions  = document.getElementById("stat-questions");
    const statCreated    = document.getElementById("stat-created");
    const resultsDiv     = document.getElementById("results-container");
    const btnRefresh     = document.getElementById("btn-refresh");
    const linkVote       = document.getElementById("link-vote");
    const lastUpdated    = document.getElementById("last-updated");

    const params = new URLSearchParams(window.location.search);
    const pollId = params.get("pollId");

    function hideOverlay() { overlay.classList.add("hidden"); }

    function showError(msg) {
      hideOverlay();
      loadErrMsg.textContent = msg;
      loadError.classList.remove("hidden");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function formatDate(iso) {
      try { return new Date(iso).toLocaleDateString("es",{day:"numeric",month:"short",year:"numeric"}); }
      catch { return "—"; }
    }

    // Bar color pairs [gradient-start, gradient-end]
    const BAR_COLORS = [
      ["#ea463a","#f0675d"],
      ["#afddd0","#c8ece6"],
      ["#4b5ea6","#6172ba"],
      ["#f5c842","#f7d96b"],
      ["#ea463a","#4b5ea6"],
      ["#afddd0","#4b5ea6"],
    ];

    function renderResults(data) {
      resultsDiv.innerHTML = "";
      let grandTotal = 0;

      data.results.forEach((q, qIdx) => {
        grandTotal += q.totalVotes;
        const maxCount = Math.max(...q.options.map(o => o.count));

        const block = document.createElement("section");
        block.className = "card animate-fadeIn";
        block.style.cssText = `animation-delay:${qIdx * 0.1}s; margin-bottom:var(--space-lg)`;
        block.setAttribute("aria-label", `Pregunta ${qIdx + 1}: ${q.text}`);

        const opts = q.options.map((opt, oIdx) => {
          const isWinner = opt.count === maxCount && maxCount > 0;
          const [c1, c2] = BAR_COLORS[oIdx % BAR_COLORS.length];
          return `
            <div class="result-option ${isWinner ? "result-winner" : ""}">
              <div class="result-option-header">
                <span class="result-option-text">${escapeHtml(opt.text)}</span>
                <div class="result-option-stats">
                  <span class="result-option-count">${opt.count}</span>
                  <span style="color:var(--color-text-2)">${opt.percentage}%</span>
                  ${isWinner && maxCount > 0 ? '<i class="fas fa-star" title="Lider actual" aria-label="Lider" style="color:var(--color-warning);font-size:0.8rem"></i>' : ""}
                </div>
              </div>
              <div class="progress-bar-wrap" role="progressbar" aria-valuenow="${opt.percentage}" aria-valuemin="0" aria-valuemax="100" aria-label="${escapeHtml(opt.text)}: ${opt.percentage}%">
                <div class="progress-bar" data-width="${opt.percentage}" style="background:linear-gradient(90deg,${c1},${c2}); width:0%"></div>
              </div>
            </div>
          `;
        }).join("");

        block.innerHTML = `
          <div class="question-number">Pregunta ${qIdx + 1} de ${data.results.length}</div>
          <h2 class="question-text">${escapeHtml(q.text)}</h2>
          <p class="text-xs text-muted" style="margin-bottom:var(--space-lg)">
            ${q.totalVotes} respuesta${q.totalVotes !== 1 ? "s" : ""}
          </p>
          ${opts}
        `;
        resultsDiv.appendChild(block);
      });

      statTotal.textContent     = grandTotal;
      statQuestions.textContent = data.results.length;
      statCreated.textContent   = formatDate(data.createdAt);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.querySelectorAll(".progress-bar[data-width]").forEach(bar => {
            bar.style.width = bar.dataset.width + "%";
          });
        });
      });
    }

    async function loadResults(isRefresh = false) {
      if (!isRefresh) overlay.classList.remove("hidden");
      if (!pollId) { showError("No se especifico el ID de la encuesta en la URL."); return; }

      try {
        const data = await getResults(pollId);
        document.title = `${data.title} — Resultados — CloudPoll`;

        pollTitle.textContent     = data.title;
        pollDesc.textContent      = data.description || "";
        pollIdDisplay.textContent = `ID: ${pollId}`;
        linkVote.href = `vote.html?pollId=${encodeURIComponent(pollId)}`;

        if (data.status !== "active") {
          pollStatusBadge.textContent = "Cerrada";
          pollStatusBadge.className   = "badge badge-warning";
        }

        renderResults(data);
        lastUpdated.textContent = `Actualizado: ${new Date().toLocaleTimeString("es")}`;

        if (!isRefresh) {
          hideOverlay();
          resultsSection.classList.remove("hidden");
        }
      } catch (err) {
        if (err.status === 404) showError(`La encuesta "${pollId}" no existe o fue eliminada.`);
        else showError("Error al cargar los resultados. Intenta de nuevo.");
      }
    }

    btnRefresh.addEventListener("click", async () => {
      btnRefresh.disabled = true;
      btnRefresh.innerHTML = '<span class="spinner" aria-hidden="true"></span> Actualizando...';
      await loadResults(true);
      btnRefresh.disabled = false;
      btnRefresh.innerHTML = '<i class="fas fa-redo" aria-hidden="true"></i> Actualizar';
    });

    loadResults();
  </script>

</body>
</html>
